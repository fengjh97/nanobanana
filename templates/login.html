<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 · 静闻的光影花园</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page login-page">
      <div class="panel login-panel">
        <h2>进入花园</h2>
        <form method="post">
          <label class="field">
            <span>访问密码</span>
            <input
              class="input"
              type="password"
              name="password"
              placeholder="请输入密码"
              required
            />
          </label>
          {% if error %}
          <p class="note">{{ error }}</p>
          {% endif %}
          <button type="submit">解锁</button>
        </form>
      </div>
    </div>
  </body>
</html>
